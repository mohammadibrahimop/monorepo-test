name: Monorepo CI/CD Automation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

jobs:
  test_matrix:
    name: Test Backend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'src/backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: src/backend

      - name: Run Backend Tests
        run: npm test
        working-directory: src/backend

  sonarqube_analysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=monorepo-test
            -Dsonar.sources=src
            -Dsonar.ws.additionalHeaders="Bypass-Tunnel-Reminders: true"

  simulate_deployment:
    name: Simulate Production Deployment
    runs-on: ubuntu-latest
    needs: [test_matrix, sonarqube_analysis] # Ensures sequential execution after both pass
    steps:
      - name: Deploy Frontend & Backend Services
        run: |
          echo "🚀 Simulating secure environment deployment..."
          echo "✅ Frontend static assets optimized."
          echo "✅ Backend service validation complete. Deployment successful!"

  create_release:
    name: Create Automated GitHub Release
    runs-on: ubuntu-latest
    needs: simulate_deployment
    if: startsWith(github.ref, 'refs/tags/v') # Restricts execution strictly to version tags
    permissions:
      contents: write # Grants the action permission to publish a release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
